<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>My First Bootstrap Page</title>
    
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">

    <style>
        .header-custom {
            background-color: #f1f3f5;
            padding: 4rem 2rem;
            margin-bottom: 3rem;
        }
        .header-title {
            color: #212529;
            font-size: 2.5rem;
            font-weight: 500;
        }
        .logo-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="header-custom text-center">
        <div class="container">
            <h1 class="header-title">My First Bootstrap Page</h1>
        </div>
    </div>

    <div class="container my-5">
        <div class="row align-items-center justify-content-center">
            
            <div class="col-4 text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/61/HTML5_logo_and_wordmark.svg" alt="HTML5 Logo" class="logo-img" style="max-height: 250px;">
            </div>

            <div class="col-4 text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/CSS3_logo_and_wordmark.svg" alt="CSS3 Logo" class="logo-img" style="max-height: 250px;">
            </div>

            <div class="col-4 text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Bootstrap_logo.svg" alt="Bootstrap Logo" class="logo-img" style="max-height: 230px;">
            </div>
            
        </div>
    </div>

    <script src="node_modules/jquery/dist/jquery.slim.min.js"></script>
</body>
</html>
