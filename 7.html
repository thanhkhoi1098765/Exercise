<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7: Demo about Cards Column</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Tùy chỉnh màu sắc viền và nền của các Card theo đúng ảnh mẫu */
        .card-blue {
            background-color: #2b7fff !important;
            border: 1px solid #2b7fff !important;
            color: #000000;
        }
        .card-yellow {
            background-color: #f7ca44 !important;
            border: 1px solid #f7ca44 !important;
            color: #000000;
        }
        .card-red {
            background-color: #ca464a !important;
            border: 1px solid #ca464a !important;
            color: #000000;
        }
        /* Căn giữa hình ảnh bên trong card và tạo khoảng cách trắng xung quanh */
        .card-custom-body {
            padding: 15px;
            text-align: center;
        }
        .card-custom-body img {
            background-color: #fff;
            padding: 15px;
            width: 100%;
            height: auto;
        }
        .card-text-custom {
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4">Cards Columns</h2>
    
    <div class="row g-3">
        
        <div class="col-md-4">
            <div class="card card-blue h-100">
                <div class="card-custom-body">
                    <img src="picture/car1.png" class="img-fluid" alt="Toyota Cross">
                    <p class="card-text-custom">Some text inside the first card</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-yellow h-100">
                <div class="card-custom-body">
                    <img src="picture/car1.png" class="img-fluid" alt="Toyota Cross">
                    <p class="card-text-custom">Some text inside the first card</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-red h-100">
                <div class="card-custom-body">
                    <img src="picture/car1.png" class="img-fluid" alt="Toyota Cross">
                    <p class="card-text-custom">Some text inside the first card</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
