<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>FPT University - About & Contact</title>
    
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">

    <style>
        .fpt-header {
            background-color: #da8223; 
            padding: 3rem 1rem 1.5rem 1rem;
        }
        .fpt-logo-container {
            background-color: #ffffff;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto 1.5rem auto;
            border-radius: 4px;
        }
        .fpt-logo {
            max-width: 100%;
            height: auto;
        }
        .fpt-nav-link {
            color: #ffffff !important;
            font-size: 1.1rem;
            padding: 0 15px;
            text-decoration: none;
        }
        .fpt-nav-link:hover {
            text-decoration: underline;
        }
        .content-section {
            padding: 3rem 0;
        }
        .fpt-footer {
            background-color: #f3d59a;
            color: #ffffff;
            padding: 20px 0;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header class="fpt-header text-center">
        <div class="container">
            <div class="fpt-logo-container shadow-sm">
                <img src="/picture/logofpt.png" alt="FPT University Logo" class="fpt-logo">
            </div>
            
            <nav class="d-flex justify-content-center mt-3">
                <a href="#" class="fpt-nav-link">Home</a>
                <a href="#" class="fpt-nav-link">About</a>
                <a href="#" class="fpt-nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container text-center my-5">
        
        <section class="content-section">
            <h2 class="fw-bold mb-3">About</h2>
            <p class="text-secondary fs-5">This is the about section of the website.</p>
        </section>

        <section class="content-section">
            <h2 class="fw-bold mb-3">Contact</h2>
            <p class="text-secondary fs-5">For any inquiries, please contact us at <a href="mailto:example@example.com" class="text-decoration-none text-dark">example@example.com</a>.</p>
        </section>

    </main>

    <footer class="fpt-footer text-center">
        <div class="container">
            <p class="m-0">© 2023 Website. All rights reserved.</p>
        </div>
    </footer>

    <script src="node_modules/jquery/dist/jquery.slim.min.js"></script>
</body>
</html>
