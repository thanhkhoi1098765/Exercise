<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8: Demo about Form Control</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        .fs-7 { font-size: 0.8rem; }
        .form-label { font-weight: 500; }
    </style>
</head>
<body class="bg-light">

    <div id="root"></div>

    <script type="text/javascript">
        const e = React.createElement;

        function BookingForm() {
            const [formData, setFormData] = React.useState({
                fullName: '',
                address: '',
                fromLocation: 'Hà Nội',
                toLocation: 'Hà Nội',
                tripType: { depart: false, return: false }
            });

            const handleChange = (event) => {
                const { name, value } = event.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCheckboxChange = (event) => {
                const { name, checked } = event.target;
                setFormData(prev => ({
                    ...prev,
                    tripType: { ...prev.tripType, [name]: checked }
                }));
            };

            const handleSubmit = (event) => {
                event.preventDefault();
                console.log('Dữ liệu form:', formData);
                alert('Đặt vé thành công! Hãy bấm F12 xem tab Console.');
            };

            return e('div', { className: 'container mt-5', style: { maxWidth: '550px' } },
                e('div', { className: 'card p-4 shadow-sm bg-white' },
                 
                    e('div', { className: 'alert alert-warning py-2 d-flex justify-content-between align-items-center' },
                        e('span', null, 'Thông báo: Vui lòng kiểm tra lại thông tin trước khi đặt.'),
                        e('button', { type: 'button', className: 'btn-close', 'data-bs-dismiss': 'alert' })
                    ),
                    
                    e('h1', { className: 'mb-4 fw-normal text-dark', style: { fontSize: '2.5rem' } }, 'Form đặt vé máy bay'),
                    
                    e('form', { onSubmit: handleSubmit },
                        
                        e('div', { className: 'mb-3' },
                            e('label', { className: 'form-label text-secondary mb-1' }, 'Họ tên'),
                            e('div', { className: 'input-group' },
                                e('span', { className: 'input-group-text bg-white text-muted' }, '👤'),
                                e('input', { type: 'text', name: 'fullName', className: 'form-control', placeholder: 'Họ tên', value: formData.fullName, onChange: handleChange }),
                                e('span', { className: 'input-group-text bg-light text-muted' }, 'vnđ')
                            ),
                            e('div', { className: 'form-text text-muted fs-7 mt-1' }, 'Phải nhập 5 ký tự, in hoa....')
                        ),
                        
                        e('div', { className: 'mb-3' },
                            e('label', { className: 'form-label text-secondary mb-1' }, 'Địa chỉ'),
                            e('input', { type: 'text', name: 'address', className: 'form-control', value: formData.address, onChange: handleChange }),
                            e('div', { className: 'form-text text-muted fs-7 mt-1' }, 'Phải nhập 5 ký tự, in hoa....')
                        ),
                       
                        e('div', { className: 'row mb-3' },
                            e('div', { className: 'col-6' },
                                e('label', { className: 'form-label text-secondary mb-1' }, 'Đi từ'),
                                e('select', { name: 'fromLocation', className: 'form-select', value: formData.fromLocation, onChange: handleChange },
                                    e('option', { value: 'Hà Nội' }, 'Hà Nội'),
                                    e('option', { value: 'Đà Nẵng' }, 'Đà Nẵng'),
                                    e('option', { value: 'TP. Hồ Chí Minh' }, 'TP. Hồ Chí Minh')
                                )
                            ),
                            e('div', { className: 'col-6' },
                                e('label', { className: 'form-label text-secondary mb-1' }, 'Đến'),
                                e('select', { name: 'toLocation', className: 'form-select', value: formData.toLocation, onChange: handleChange },
                                    e('option', { value: 'Hà Nội' }, 'Hà Nội'),
                                    e('option', { value: 'Đà Nẵng' }, 'Đà Nẵng'),
                                    e('option', { value: 'TP. Hồ Chí Minh' }, 'TP. Hồ Chí Minh')
                                )
                            )
                        ),

                        e('div', { className: 'mb-4' },
                            e('label', { className: 'form-label text-secondary mb-1 d-block' }, 'Chọn chiều đi (Khứ hồi)'),
                            e('div', { className: 'form-check mb-1' },
                                e('input', { type: 'checkbox', name: 'depart', className: 'form-check-input', id: 'chkDi', checked: formData.tripType.depart, onChange: handleCheckboxChange }),
                                e('label', { className: 'form-check-label text-muted', htmlFor: 'chkDi' }, 'Đi')
                            ),
                            e('div', { className: 'form-check' },
                                e('input', { type: 'checkbox', name: 'return', className: 'form-check-input', id: 'chkVề', checked: formData.tripType.return, onChange: handleCheckboxChange }),
                                e('label', { className: 'form-check-label text-muted', htmlFor: 'chkVề' }, 'Về')
                            )
                        ),
                     
                        e('button', { type: 'submit', className: 'btn btn-primary w-100 py-2 fw-medium' }, 'Đặt vé')
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(BookingForm));
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
